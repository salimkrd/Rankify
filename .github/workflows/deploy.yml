name: Deploy Rankify to Hostinger

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fix Vite permission
        run: chmod +x ./node_modules/.bin/vite
        
      - name: Build project
        run: npm run build

      - name: Verify dist output
        run: |
          ls -la dist
          ls -la dist/assets

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist to Hostinger
        run: |
         lftp -u "${{ secrets.HOSTINGER_FTP_USER }}","${{ secrets.HOSTINGER_FTP_PASSWORD }}" -p 21 "${{ secrets.HOSTINGER_FTP_HOST }}" <<EOF
         set ftp:ssl-allow no
         set net:timeout 20
         set net:max-retries 2
         mirror -R --delete --verbose --include-glob .htaccess --include-glob assets/** --include-glob index.html --include-glob favicon.ico --include-glob '*' ./dist/ ./public_html/
         bye
         EOF

      - name: Verify Hostinger upload
        run: |
         lftp -u "${{ secrets.HOSTINGER_FTP_USER }}","${{ secrets.HOSTINGER_FTP_PASSWORD }}" -p 21 "${{ secrets.HOSTINGER_FTP_HOST }}" <<EOF
         set ftp:ssl-allow no
         set net:timeout 20
         set net:max-retries 2
         cd public_html
         ls -la
         bye
         EOF
