name: Deploy Rankify to Hostinger

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fix Vite permission
        run: chmod +x ./node_modules/.bin/vite
        
      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify dist output
        run: |
          ls -la dist
          ls -la dist/assets

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist to Hostinger
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" -p "${{ secrets.FTP_PORT }}" "${{ secrets.FTP_HOST }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:max-retries 5
          set net:timeout 30
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 20
          set cmd:fail-exit yes

          mirror -R --delete --verbose \
            --include-glob .htaccess \
            --include-glob assets/** \
            --include-glob index.html \
            --include-glob favicon.ico \
            --include-glob '*' \
            ./dist/ ./

          ls -la
          bye
          EOF
